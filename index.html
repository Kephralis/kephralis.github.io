<head>
    <meta charset="UTF-8">

    <style>
        /* CSS Variables - EDIT THESE TO CHANGE SITE COLORS AND STYLES */
        :root {
            --bg-color: #0c0d12;
            --column-width: 280px;
            --entry-padding: 6px 10px;
            
            --tier1-accent: #fcd34d; /* Golden */
            --tier2-accent: #9ca3af; /* Silver */
            --tier3-accent: #b45309; /* Bronze */
            --tier4-accent: #374151; /* Dark Grey */
            --tier5-accent: #1f2937; /* Very Dark Grey */

            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
            --entry-bg: #111827;
            --border-radius-main: 12px;
            --border-radius-entry: 6px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow-x: hidden; /* Prevents unwanted horizontal scroll on some devices */
        }

        /* --- Main Content Area --- */
        .page-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            height: 100%;
        }

        .tier-columns-container {
            display: flex;
            gap: 12px;
            max-width: 100%;
            overflow-x: auto; /* Adds scrolling for small screens if columns don't fit */
            padding-bottom: 20px; /* Space for the scrollbar */
        }

        /* Responsive Breakpoints */
        @media (max-width: 1400px) {
            /* On medium screens, shift from vertical columns to stacking */
            .tier-columns-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }

        /* --- Individual Tier Column --- */
        .tier-column {
            width: var(--column-width);
            background-color: #111827;
            border-radius: var(--border-radius-main);
            display: flex;
            flex-direction: column;
            flex-shrink: 0; /* Prevents column from squishing below width on scroll */
        }

        .tier-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-top-left-radius: var(--border-radius-main);
            border-top-right-radius: var(--border-radius-main);
            background-color: #1f2937;
            margin-bottom: 10px;
        }

        .tier-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trophy-icon {
            width: 24px;
            height: 24px;
        }

        .tier-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .header-arrow-icon {
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }

        /* --- Individual Player Entry --- */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 10px 10px 10px;
        }

        .player-entry {
            display: flex;
            align-items: center;
            background-color: var(--entry-bg);
            border-radius: var(--border-radius-entry);
            padding: var(--entry-padding);
            transition: background-color 0.2s;
        }

        .player-entry:hover {
            background-color: #1f2937;
        }

        .skin-avatar-container {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0c0d12;
            border-radius: 4px;
            overflow: hidden;
            margin-right: 12px;
        }

        .skin-avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-info {
            flex-grow: 1;
        }

        .player-name {
            font-size: 1rem;
            color: var(--text-main);
        }

        .player-rank {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .action-arrow {
            width: 14px;
            height: 14px;
            opacity: 0.3;
        }

        /* --- Special Styling for Tier 1 Highlighting --- */
        .tier-column.tier1 .tier-title {
            color: var(--tier1-accent);
        }

        .tier-column.tier1 .player-list {
            padding-top: 10px;
        }

        .tier-column.tier1 .player-entry.highlighted-entry {
            flex-direction: column;
            align-items: flex-start;
            padding: 16px;
            background-color: #1e1b29; /* Darker Purple for prominence */
            border-radius: 12px;
            gap: 12px;
        }

        .tier-column.tier1 .player-entry.highlighted-entry .skin-avatar-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-right: 0;
        }

        .tier-column.tier1 .player-entry.highlighted-entry .player-name {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* --- Utility to replicate entry layout --- */
        .standard-entry {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* Placeholder image style for skin avatars */
        .skin-placeholder {
            width: 100%;
            height: 100%;
            background-color: #555; /* Default background, color can be added inline */
        }
    </style>
</head>
