<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Radiant Tiers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color Palette */
            --bg-body: #0d1117;
            --bg-card: #161b22;
            
            /* Row Colors */
            --bg-row-high: #1c2128;
            --bg-row-low: #13171d;
            
            --text-main: #ffffff;
            --text-muted: #7d8590;
            
            /* Status Colors */
            --status-high: #238636;
            --status-low: #da3633;

            /* Specific Tier Header Colors */
            --color-t1: #a3e635; /* Lime */
            --color-t2: #facc15; /* Yellow */
            --color-t3: #fb923c; /* Orange */
            --color-t4: #f87171; /* Red */
            --color-t5: #a8a29e; /* Light Brown/Stone */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        /* --- Grid Layout --- */
        .board-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(250px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1600px;
        }

        @media (max-width: 1400px) { .board-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .board-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .board-container { grid-template-columns: 1fr; } }

        .tier-column {
            background-color: var(--bg-card);
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: fit-content;
        }

        /* --- Headers with Radiant Gradients --- */
        .tier-header {
            padding: 16px 12px;
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #30363d;
        }

        /* Dynamic Gradients per Tier */
        .tier-1 .tier-header { 
            color: var(--color-t1); 
            background: linear-gradient(to bottom, rgba(163, 230, 53, 0.15), transparent); 
        }
        .tier-2 .tier-header { 
            color: var(--color-t2); 
            background: linear-gradient(to bottom, rgba(250, 204, 21, 0.15), transparent); 
        }
        .tier-3 .tier-header { 
            color: var(--color-t3); 
            background: linear-gradient(to bottom, rgba(251, 146, 60, 0.15), transparent); 
        }
        .tier-4 .tier-header { 
            color: var(--color-t4); 
            background: linear-gradient(to bottom, rgba(248, 113, 113, 0.15), transparent); 
        }
        .tier-5 .tier-header { 
            color: var(--color-t5); 
            background: linear-gradient(to bottom, rgba(168, 162, 158, 0.15), transparent); 
        }

        /* --- Player Rows --- */
        .player-row {
            display: grid;
            grid-template-columns: 4px 32px 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
            transition: background-color 0.2s;
        }

        .player-row:hover {
            filter: brightness(1.3);
        }

        .player-row.rank-high { background-color: var(--bg-row-high); }
        .player-row.rank-low { background-color: var(--bg-row-low); opacity: 0.95; }

        /* Status Bar logic */
        .status-bar { height: 70%; width: 3px; border-radius: 4px; }
        .rank-high .status-bar { background-color: var(--status-high); }
        .rank-low .status-bar { background-color: var(--status-low); }

        .avatar { width: 28px; height: 28px; border-radius: 4px; background: #30363d; }
        .username { font-size: 0.85rem; font-weight: 500; }

        /* --- Arrow Logic --- */
        .arrows {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.65rem;
            line-height: 0.7;
        }

        .rank-high .arrows::before { content: '▲'; }
        .arrows::after { content: '▲'; }
        
        /* Tier 1 Highlight: Subtle Lime Tint */
        .tier-1 .player-row { background-color: rgba(163, 230, 53, 0.05); }

    </style>
</head>
<body>

    <div class="board-container" id="leaderboard"></div>

    <script>
        const data = {
            "Tier 1": [
                { name: "K1RBE", rank: "high", img: "https://minotar.net/avatar/K1RBE/32.png" }
            ],
            "Tier 2": [
                { name: "Camcal", rank: "high", img: "https://minotar.net/avatar/Camcal/32.png" },
                { name: "Demonmcc", rank: "high", img: "https://minotar.net/avatar/Demonmcc/32.png" },
                { name: "KingD3fault", rank: "high", img: "https://minotar.net/avatar/KingD3fault/32.png" },
                { name: "qPower", rank: "low", img: "https://minotar.net/avatar/qPower/32.png" },
                { name: "Tokenu", rank: "low", img: "https://minotar.net/avatar/Tokenu/32.png" },
                { name: "cloudmlol", rank: "low", img: "https://minotar.net/avatar/cloudmlol/32.png" }
            ],
            "Tier 3": [
                { name: "jayckuuub", rank: "high", img: "https://minotar.net/avatar/jayckuuub/32.png" },
                { name: "ItzTerrel", rank: "high", img: "https://minotar.net/avatar/ItzTerrel/32.png" },
                { name: "thelastw1nter", rank: "low", img: "https://minotar.net/avatar/thelastw1nter/32.png" },
                { name: "isolation", rank: "low", img: "https://minotar.net/avatar/isolation/32.png" }
            ],
            "Tier 4": [
                { name: "MPI_YT", rank: "high", img: "https://minotar.net/avatar/MPI_YT/32.png" },
                { name: "chuypopis", rank: "low", img: "https://minotar.net/avatar/chuypopis/32.png" }
            ],
            "Tier 5": [
                { name: "ALIPROYT1", rank: "high", img: "https://minotar.net/avatar/ALIPROYT1/32.png" },
                { name: "hiadyman", rank: "low", img: "https://minotar.net/avatar/hiadyman/32.png" }
            ]
        };

        function render() {
            const container = document.getElementById('leaderboard');
            Object.keys(data).forEach((tier, index) => {
                const tierDiv = document.createElement('div');
                tierDiv.className = `tier-column tier-${index + 1}`;
                
                let playersHtml = data[tier].map(p => `
                    <div class="player-row rank-${p.rank}">
                        <div class="status-bar"></div>
                        <img src="${p.img}" class="avatar" alt="${p.name}">
                        <div class="username">${p.name}</div>
                        <div class="arrows"></div>
                    </div>
                `).join('');

                tierDiv.innerHTML = `
                    <div class="tier-header">🏆 ${tier}</div>
                    <div class="player-list">${playersHtml}</div>
                `;
                container.appendChild(tierDiv);
            });
        }
        render();
    </script>
</body>
</html>
