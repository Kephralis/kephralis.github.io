<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Geist Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color Palette */
            --bg-body: #0d1117;
            --bg-card: #161b22;
            
            /* Row Colors */
            --bg-row-high: #1c2128; 
            --bg-row-low: #13171d;  
            
            --text-main: #ffffff;
            --text-muted: #7d8590;
            
            /* Status Colors */
            --status-high: #238636; 
            --status-low: #da3633;  
            
            /* Tier Header Accents */
            --tier1-gold: #d29922;
            --tier2-silver: #8b949e;
            --tier3-bronze: #af7d24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 2. Updated font name to match Google Fonts registration */
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
            /* Subtly tighten letters for that modern tech look */
            letter-spacing: -0.02em; 
        }

        /* --- Grid Layout --- */
        .board-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(250px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1600px;
        }

        /* Responsive Columns */
        @media (max-width: 1400px) { .board-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .board-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .board-container { grid-template-columns: 1fr; } }

        .tier-column {
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid #30363d;
            overflow: hidden;
            height: fit-content;
        }

        /* --- Headers --- */
        .tier-header {
            padding: 12px;
            text-align: center;
            font-weight: 800; /* Extra bold for Geist headers */
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
            border-bottom: 1px solid #30363d;
            text-transform: uppercase;
        }

        .tier-1 .tier-header { color: var(--tier1-gold); }
        .tier-2 .tier-header { color: var(--tier2-silver); }
        .tier-3 .tier-header { color: var(--tier3-bronze); }

        /* --- Player Rows --- */
        .player-row {
            display: grid;
            grid-template-columns: 4px 32px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
            transition: background-color 0.2s, filter 0.2s;
        }

        .player-row:hover {
            filter: brightness(1.3);
            background-color: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        /* High vs Low Styling */
        .player-row.rank-high { background-color: var(--bg-row-high); }
        .player-row.rank-low { background-color: var(--bg-row-low); opacity: 0.9; }

        /* Status Indicator Left Bar */
        .status-bar {
            height: 18px;
            width: 3px;
            border-radius: 10px;
        }
        .rank-high .status-bar { background-color: var(--status-high); }
        .rank-low .status-bar { background-color: var(--status-low); }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #30363d;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .username {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- Arrow Logic --- */
        .arrows {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.65rem;
            line-height: 0.7;
            opacity: 0.5;
        }

        .rank-high .arrows::before { content: '▲'; color: var(--status-high); }
        .arrows::after { content: '▲'; }
        
        .tier-1 .player-row { background-color: rgba(210, 153, 34, 0.05); }

    </style>
</head>
<body>

    <div class="board-container" id="leaderboard"></div>

    <script>
        const data = {
            "Tier 1": [
                { name: "K1RBE", rank: "high", img: "https://minotar.net/avatar/K1RBE/32.png" }
            ],
            "Tier 2": [
                { name: "Camcal", rank: "high", img: "https://minotar.net/avatar/Camcal/32.png" },
                { name: "Demonmcc", rank: "high", img: "https://minotar.net/avatar/Demonmcc/32.png" },
                { name: "KingD3fault", rank: "high", img: "https://minotar.net/avatar/KingD3fault/32.png" },
                { name: "qPower", rank: "low", img: "https://minotar.net/avatar/qPower/32.png" },
                { name: "Tokenu", rank: "low", img: "https://minotar.net/avatar/Tokenu/32.png" },
                { name: "cloudmlol", rank: "low", img: "https://minotar.net/avatar/cloudmlol/32.png" }
            ],
            "Tier 3": [
                { name: "jayckuuub", rank: "high", img: "https://minotar.net/avatar/jayckuuub/32.png" },
                { name: "ItzTerrel", rank: "high", img: "https://minotar.net/avatar/ItzTerrel/32.png" },
                { name: "thelastw1nter", rank: "low", img: "https://minotar.net/avatar/thelastw1nter/32.png" },
                { name: "isolation", rank: "low", img: "https://minotar.net/avatar/isolation/32.png" }
            ],
            "Tier 4": [
                { name: "MPI_YT", rank: "high", img: "https://minotar.net/avatar/MPI_YT/32.png" },
                { name: "chuypopis", rank: "low", img: "https://minotar.net/avatar/chuypopis/32.png" }
            ],
            "Tier 5": [
                { name: "ALIPROYT1", rank: "high", img: "https://minotar.net/avatar/ALIPROYT1/32.png" },
                { name: "hiadyman", rank: "low", img: "https://minotar.net/avatar/hiadyman/32.png" }
            ]
        };

        function render() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = ''; // Clear previous content
            
            Object.keys(data).forEach((tier, index) => {
                const tierDiv = document.createElement('div');
                tierDiv.className = `tier-column tier-${index + 1}`;
                
                let playersHtml = data[tier].map(p => `
                    <div class="player-row rank-${p.rank}">
                        <div class="status-bar"></div>
                        <img src="${p.img}" class="avatar">
                        <div class="username">${p.name}</div>
                        <div class="arrows"></div>
                    </div>
                `).join('');

                tierDiv.innerHTML = `
                    <div class="tier-header">🏆 ${tier}</div>
                    <div class="player-list">${playersHtml}</div>
                `;
                container.appendChild(tierDiv);
            });
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
