<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Player Leaderboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css">
    
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            
            /* Backgrounds for Upper vs Lower rows */
            --bg-upper: #21262d; /* Brighter */
            --bg-lower: #161b22; /* Darker/Standard */
            
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            
            /* Tier Colors */
            --tier1-accent: #f59e0b;
            --tier2-accent: #8b949e;
            --tier3-accent: #b45309;
            
            --status-green: #238636;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Geist Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .board-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(250px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 1600px;
        }

        /* Responsive Columns */
        @media (max-width: 1200px) { .board-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .board-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .board-container { grid-template-columns: 1fr; } }

        .tier-column {
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px solid #30363d;
            height: fit-content;
        }

        .tier-header {
            padding: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Row Styling */
        .player-row {
            display: grid;
            grid-template-columns: 4px 32px 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-bottom: 1px solid #30363d;
            transition: 0.2s ease;
        }

        /* Upper Tier Styling: Brighter background */
        .player-row.upper {
            background-color: var(--bg-upper);
        }

        /* Lower Tier Styling: Darker background */
        .player-row.lower {
            background-color: var(--bg-lower);
        }

        .status-bar {
            height: 20px;
            width: 4px;
            border-radius: 2px;
            background-color: var(--status-green);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: #30363d;
        }

        .name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .rank-icon {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 1rem;
        }

        /* Specific Tier Header Colors */
        .t1 .tier-header { color: var(--tier1-accent); }
        .t2 .tier-header { color: var(--tier2-accent); }
        .t3 .tier-header { color: var(--tier3-accent); }
    </style>
</head>
<body>

    <div class="board-container" id="leaderboard"></div>

    <script>
        // EASY EDIT DATA: Just change 'rankType' to 'upper' or 'lower'
        const data = {
            "Tier 1": [
                { name: "K1RBE", rankType: "upper" }
            ],
            "Tier 2": [
                { name: "Camcal", rankType: "upper" },
                { name: "Demonmcc", rankType: "upper" },
                { name: "KingD3fault", rankType: "upper" },
                { name: "qPower", rankType: "lower" },
                { name: "Tokenu", rankType: "lower" }
            ],
            "Tier 3": [
                { name: "jayckuuub", rankType: "upper" },
                { name: "ItzTerrel", rankType: "lower" }
            ],
            "Tier 4": [
                { name: "MPI_YT", rankType: "upper" },
                { name: "chuypopis", rankType: "lower" }
            ],
            "Tier 5": [
                { name: "ALIPROYT1", rankType: "upper" },
                { name: "hiadyman", rankType: "lower" }
            ]
        };

        const container = document.getElementById('leaderboard');

        Object.keys(data).forEach((tier, index) => {
            const column = document.createElement('div');
            column.className = `tier-column t${index + 1}`;
            
            let rowsHtml = `
                <div class="tier-header">
                    <span>🏆</span> ${tier}
                </div>
            `;

            data[tier].forEach(player => {
                // Logic for the arrows: Upper gets double (»), Lower gets single (^)
                const arrow = player.rankType === 'upper' ? '»' : '▲';
                
                rowsHtml += `
                    <div class="player-row ${player.rankType}">
                        <div class="status-bar"></div>
                        <img class="avatar" src="https://minotar.net/avatar/${player.name}/32.png">
                        <div class="name">${player.name}</div>
                        <div class="rank-icon">${arrow}</div>
                    </div>
                `;
            });

            column.innerHTML = rowsHtml;
            container.appendChild(column);
        });
    </script>
</body>
</html>
